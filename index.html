<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ASAP Trips</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

</head>

<body>

    <!-- HEADER -->
    <div id="header"></div>

    <!-- PAGE CONTENT -->
<!-- =========================
     HERO SECTION START
========================== -->

<section class="flight-hero">

  <div class="container">

    <!-- HERO CONTENT -->
    <div class="hero-content text-center">

      <!-- PLANE IMAGE -->
      <div class="plane-image">

        <img
          src="https://i.ibb.co/ZYW3VTp/plane.png"
          alt="Plane"
        >

      </div>

      <!-- TITLE -->
      <h1>ASAPTRIPS</h1>

      <p>
        Smart Travel Starts with Great Deals
      </p>

      <!-- TRIP BUTTONS -->
      <div class="trip-buttons">

        <button class="trip-btn active">
          Roundtrip
        </button>

        <button class="trip-btn">
          Oneway
        </button>

      </div>

    </div>

    <!-- SEARCH FORM -->
    <div class="search-wrapper">

      <form id="flightForm">

        <div class="row g-3">

          <!-- FROM -->
          <div class="col-lg col-md-6">

            <div class="flight-input">

              <input
                type="text"
                id="from"
                placeholder="Fly from"
                required
              >

            </div>

          </div>

          <!-- TO -->
          <div class="col-lg col-md-6">

            <div class="flight-input">

              <input
                type="text"
                id="to"
                placeholder="Fly to"
                required
              >

            </div>

          </div>

          <!-- DEPARTURE -->
          <div class="col-lg col-md-6">

            <div class="flight-input icon-box">

              <input
                type="date"
                id="departure"
                required
              >

              <i class="fa-solid fa-calendar-days"></i>

            </div>

          </div>

          <!-- RETURN -->
          <div class="col-lg col-md-6">

            <div class="flight-input icon-box">

              <input
                type="date"
                id="return"
              >

              <i class="fa-solid fa-calendar-days"></i>

            </div>

          </div>

          <!-- PASSENGERS -->
          <div class="col-lg col-md-6">

            <div class="flight-input icon-box">

              <select id="passengers">

                <option>Passengers</option>
                <option>1 Passenger</option>
                <option>2 Passengers</option>
                <option>3 Passengers</option>
                <option>4+ Passengers</option>

              </select>

              <i class="fa-solid fa-user"></i>

            </div>

          </div>

        </div>

        <!-- NOTE -->
        <p class="search-note">

          After sending request,
          We'll contact you for more details about Flight.

        </p>

        <!-- BUTTON -->
        <div class="text-center">

          <button
            type="submit"
            class="search-btn"
          >

            Search for Flights

            <span>
              <i class="fa-solid fa-arrow-right"></i>
            </span>

          </button>

        </div>

      </form>

    </div>

    <!-- SOCIAL ICONS -->
    <div class="hero-social">

      <a href="#">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="#">
        <i class="fab fa-linkedin-in"></i>
      </a>

      <a href="#">
        <i class="fab fa-twitter"></i>
      </a>

      <a href="#">
        <i class="fa-solid fa-phone"></i>
      </a>

    </div>

  </div>

</section>

<!-- =========================
     HERO SECTION END
========================== -->

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="js/main.js"></script>

</body>

</html>
