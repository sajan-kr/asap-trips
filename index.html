<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ASAP Trips</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./images/favicon.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- HEADER -->
    <div id="header"></div>

    <!-- PAGE CONTENT -->

    <!-- ======== HERO SECTION START ========= -->

    <section class="flight-hero d-flex align-items-center position-relative overflow-hidden">

        <!-- HALF CIRCLE -->
        <div class="hero-circle position-absolute start-50 translate-middle-x"></div>

        <div class="container position-relative z-2">

            <!-- HERO CONTENT -->
            <div class="text-center hero-content">

                <!-- PLANE IMAGE -->
                <div class="plane-image mx-auto">

                    <img src="images/hero-plane.png" alt="Plane" class="img-fluid">

                </div>

                <!-- TITLE -->
                <h1 class="hero-title text-uppercase fw-bold">
                    ASAPTRIPS
                </h1>

                <!-- SUBTITLE -->
                <p class="hero-subtitle">
                    Smart Travel Starts with Great Deals
                </p>

                <!-- TRIP BUTTONS -->
                <div class="trip-buttons d-flex justify-content-center">

                    <div class="trip-switch d-inline-flex">

                        <button class="trip-btn active">
                            Roundtrip
                        </button>

                        <button class="trip-btn">
                            Oneway
                        </button>

                    </div>

                </div>

            </div>

            <!-- SEARCH FORM -->
            <div class="search-wrapper">

                <div class="row g-3 justify-content-center">

                    <!-- FROM -->
                    <div class="col-lg col-md-6">

                        <div class="flight-input d-flex align-items-center">

                            <input type="text" placeholder="Fly from" class="w-100 border-0" list="fromCities">
                            <datalist id="fromCities">

                                <option value="Delhi"></option>
                                <option value="Mumbai"></option>
                                <option value="Dubai"></option>
                                <option value="London"></option>
                                <option value="Toronto"></option>
                                <option value="Singapore"></option>
                                <option value="Paris"></option>
                                <option value="Sydney"></option>

                            </datalist>
                        </div>

                    </div>

                    <!-- TO -->
                    <div class="col-lg col-md-6">

                        <div class="flight-input d-flex align-items-center">

                            <input type="text" placeholder="Fly to" class="w-100 border-0" list="toCities">

                            <datalist id="toCities">

                                <option value="Tokyo"></option>
                                <option value="Rome"></option>
                                <option value="Berlin"></option>
                                <option value="Chicago"></option>
                                <option value="Doha"></option>
                                <option value="Amsterdam"></option>

                            </datalist>
                        </div>

                    </div>

                    <!-- DATE -->
                    <div class="col-lg col-md-6">

                        <div class="flight-input d-flex align-items-center justify-content-between">

                            <input type="date" class="w-100 border-0">

                            <i class="fa-solid fa-calendar-days"></i>

                        </div>

                    </div>

                    <!-- RETURN -->
                    <div class="col-lg col-md-6">

                        <div class="flight-input d-flex align-items-center justify-content-between">

                            <input type="date" class="w-100 border-0">

                            <i class="fa-solid fa-calendar-days"></i>

                        </div>

                    </div>

                    <!-- PASSENGERS -->
                    <div class="col-lg col-md-6">

                        <div class="flight-input d-flex align-items-center justify-content-between">

                            <select class="w-100 border-0">

                                <option>
                                    Passengers
                                </option>

                                <option>
                                    1 Passenger
                                </option>

                                <option>
                                    2 Passengers
                                </option>

                                <option>
                                    3 Passengers
                                </option>

                            </select>

                            <i class="fa-solid fa-user"></i>

                        </div>

                    </div>

                </div>

                <!-- NOTE -->
                <p class="search-note text-center">

                    * After sending request,
                    We'll contact you for more details
                    about Flight.

                </p>

                <!-- BUTTON -->
                <div class="text-center">

                    <button id="searchFlightBtn" class="search-btn d-inline-flex align-items-center">

                        Search for Flights

                        <span class="d-flex align-items-center justify-content-center">

                            <i class="fa-solid fa-arrow-right"></i>

                        </span>

                    </button>

                </div>

            </div>

            <!-- SOCIAL ICONS -->
            <!-- <div class="hero-social position-absolute d-flex flex-column">

                <a href="#" class="social-icon d-flex align-items-center justify-content-center">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="#" class="social-icon d-flex align-items-center justify-content-center">
                    <i class="fab fa-linkedin-in"></i>
                </a>

                <a href="#" class="social-icon d-flex align-items-center justify-content-center">
                    <i class="fab fa-twitter"></i>
                </a>

                <a href="#" class="social-icon d-flex align-items-center justify-content-center">
                    <i class="fa-solid fa-phone"></i>
                </a>

            </div> -->

        </div>

    </section>

    <!-- ========== HERO SECTION END ========= -->

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="js/main.js"></script>

</body>

</html>
