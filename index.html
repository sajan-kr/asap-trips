<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ASAP Trips Navbar</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    /* =========================
       NAVBAR
    ========================== */

    .custom-navbar{
      background:#000;
      padding:14px 0;
      position:sticky;
      top:0;
      z-index:999;
      transition:0.3s;
    }

    .custom-navbar.scrolled{
      padding:10px 0;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
    }

    /* LOGO */

    .navbar-brand img{
      height:30px;
      object-fit:contain;
    }

    /* MENU */

    .navbar-nav{
      gap:22px;
    }

    .navbar-nav .nav-link{
      color:#b8b8b8;
      font-size:13px;
      font-weight:500;
      transition:0.3s;
      position:relative;
    }

    .navbar-nav .nav-link:hover{
      color:#fff;
    }

    .navbar-nav .nav-link.active{
      color:#ff5a2c;
    }

    /* UNDERLINE EFFECT */

    .navbar-nav .nav-link::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0;
      height:2px;
      background:#ff5a2c;
      transition:0.3s;
    }

    .navbar-nav .nav-link:hover::after{
      width:100%;
    }

    /* CONTACT BUTTON */

    .contact-btn{
      border:none;
      background:#fff;
      color:#000;
      border-radius:50px;
      padding:10px 18px;
      font-size:12px;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:8px;
      transition:0.3s;
    }

    .contact-btn:hover{
      transform:translateY(-2px);
    }

    .contact-btn i{
      width:18px;
      height:18px;
      background:#000;
      color:#fff;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
    }

    /* MOBILE MENU */

    .navbar-toggler{
      border:none;
      box-shadow:none !important;
    }

    .navbar-toggler i{
      color:#fff;
      font-size:24px;
    }

    /* MOBILE RESPONSIVE */

    @media(max-width:991px){

      .navbar-collapse{
        background:#111;
        margin-top:15px;
        padding:20px;
        border-radius:16px;
      }

      .navbar-nav{
        gap:12px;
      }

      .contact-btn{
        margin-top:15px;
      }

    }

    /* DEMO SECTION */

    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(
      rgba(0,0,0,0.5),
      rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');

      background-size:cover;
      background-position:center;
      color:#fff;
      text-align:center;
    }

    .hero h1{
      font-size:60px;
      font-weight:700;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:38px;
      }

    }

  </style>

</head>

<body>

  <!-- =========================
       NAVBAR START
  ========================== -->

  <nav class="navbar navbar-expand-lg custom-navbar">

    <div class="container">

      <!-- LOGO -->
      <a class="navbar-brand" href="#">

        <img
          src="https://www.asaptrips.com/images/logo.png"
          alt="ASAP Trips"
        />

      </a>

      <!-- MOBILE TOGGLE -->

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
      >

        <i class="fa-solid fa-bars"></i>

      </button>

      <!-- NAV MENU -->

      <div class="collapse navbar-collapse" id="navbarContent">

        <ul class="navbar-nav mx-auto">

          <li class="nav-item">
            <a class="nav-link active" href="#">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Flights
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Hotel
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Blog
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              My Reservation
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              Customer Support
            </a>
          </li>

        </ul>

        <!-- CONTACT BUTTON -->

        <button class="contact-btn">

          Contact Us

          <i class="fa-solid fa-arrow-right"></i>

        </button>

      </div>

    </div>

  </nav>

  <!-- =========================
       HERO SECTION
  ========================== -->

  <section class="hero">

    <div>

      <h1>
        Explore The World
      </h1>

      <p class="mt-3">
        Book Cheap Flights & Amazing Deals
      </p>

    </div>

  </section>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->

  <script>

    // NAVBAR SCROLL EFFECT

    window.addEventListener("scroll", function(){

      const navbar =
      document.querySelector(".custom-navbar");

      navbar.classList.toggle(
        "scrolled",
        window.scrollY > 50
      );

    });

  </script>

</body>

</html>
