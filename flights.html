<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ASAP Trips</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./images/favicon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>
  <!-- =========================================
     Flights Page Start
========================================= -->
  <section class="asap-flights-page">

    <!-- =========================================
         Hero Section Start
    ========================================= -->
    <section class="asap-flight-hero">

      <div class="container">

        <div class="row align-items-center">

          <!-- Left Content -->
          <div class="col-lg-6">

            <span class="asap-flight-badge">
              Flights Booking
            </span>

            <h1 class="asap-flight-title">
              Fly Smarter <br>
              Travel Better
            </h1>

            <p class="asap-flight-desc">
              Search hundreds of airlines and discover the best fares for your next adventure.
            </p>

            <div class="asap-popular-routes">

              <span>Popular:</span>

              <a href="#">Delhi → Dubai</a>
              <a href="#">NYC → London</a>
              <a href="#">Mumbai → Singapore</a>

            </div>

          </div>

          <!-- Right Image -->
          <div class="col-lg-6 text-center">

            <div class="asap-plane-wrapper">

              <div class="asap-glow"></div>

              <img src="images/hero-plane.png" alt="Plane" class="img-fluid asap-plane-img">

            </div>

          </div>

        </div>

      </div>

    </section>
    <!-- Hero Section End -->


    <!-- =========================================
         Search Card Start
    ========================================= -->
    <div class="container">

      <div class="asap-search-box">

        <!-- Tabs -->
        <ul class="nav nav-pills asap-trip-tabs">

          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#roundtrip">

              Round Trip

            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#oneway">

              One Way

            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#multicity">

              Multi City

            </button>
          </li>

        </ul>

        <div class="tab-content">

          <!-- =====================================
                     ROUND TRIP
                ====================================== -->
          <div class="tab-pane fade show active" id="roundtrip">

            <div class="row g-3 align-items-center">

              <!-- From -->
              <div class="col-lg-3">

                <div class="asap-field">

                  <label>From</label>

                  <input type="text" id="fromAirport" class="form-control" list="airportList" placeholder="Flying From">

                </div>

              </div>

              <!-- Swap -->
              <div class="col-lg-auto text-center">

                <button type="button" id="swapAirport" class="asap-swap-btn">

                  <i class="bi bi-arrow-left-right"></i>

                </button>

              </div>

              <!-- To -->
              <div class="col-lg-3">

                <div class="asap-field">

                  <label>To</label>

                  <input type="text" id="toAirport" class="form-control" list="airportList" placeholder="Flying To">

                </div>

              </div>

              <!-- Departure -->
              <div class="col-lg-2">

                <div class="asap-field">

                  <label>Departure</label>

                  <input type="date" id="departureDate" class="form-control">

                </div>

              </div>

              <!-- Return -->
              <div class="col-lg-2">

                <div class="asap-field">

                  <label>Return</label>

                  <input type="date" id="returnDate" class="form-control">

                </div>

              </div>

            </div>

            <div class="row mt-3 g-3">

              <!-- Travelers -->
              <div class="col-lg-3">

                <div class="asap-field">

                  <label>Travellers</label>

                  <select class="form-select border-0">

                    <option>1 Adult</option>
                    <option>2 Adults</option>
                    <option>3 Adults</option>
                    <option>4 Adults</option>

                  </select>

                </div>

              </div>

              <!-- Class -->
              <div class="col-lg-3">

                <div class="asap-field">

                  <label>Class</label>

                  <select class="form-select border-0">

                    <option>Economy</option>
                    <option>Premium Economy</option>
                    <option>Business</option>
                    <option>First Class</option>

                  </select>

                </div>

              </div>

              <!-- Search -->
              <div class="col-lg-3">

                <button id="searchFlightBtn" class="asap-search-btn">

                  Search Flights

                </button>

              </div>

            </div>

          </div>

          <!-- =====================================
                     ONE WAY
                ====================================== -->
          <div class="tab-pane fade" id="oneway">

            <div class="row g-3">

              <div class="col-lg-4">

                <input type="text" class="form-control" placeholder="Flying From">

              </div>

              <div class="col-lg-4">

                <input type="text" class="form-control" placeholder="Flying To">

              </div>

              <div class="col-lg-2">

                <input type="date" class="form-control">

              </div>

              <div class="col-lg-2">

                <button class="asap-search-btn">

                  Search

                </button>

              </div>

            </div>

          </div>

          <!-- =====================================
                     MULTI CITY
                ====================================== -->
          <div class="tab-pane fade" id="multicity">

            <div id="multiCityContainer">

              <div class="row g-3 multi-city-row">

                <div class="col-lg-4">

                  <input type="text" class="form-control" placeholder="Flying From">

                </div>

                <div class="col-lg-4">

                  <input type="text" class="form-control" placeholder="Flying To">

                </div>

                <div class="col-lg-3">

                  <input type="date" class="form-control">

                </div>

                <div class="col-lg-1">

                  <button class="btn btn-danger">

                    ×

                  </button>

                </div>

              </div>

            </div>

            <div class="mt-3">

              <button id="addFlightBtn" class="btn btn-outline-danger">

                + Add Another Flight

              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- Airport List -->
    <datalist id="airportList">

      <option value="Delhi (DEL)">
      <option value="Mumbai (BOM)">
      <option value="Dubai (DXB)">
      <option value="London (LHR)">
      <option value="New York (JFK)">
      <option value="Paris (CDG)">
      <option value="Singapore (SIN)">
      <option value="Bangkok (BKK)">
      <option value="Toronto (YYZ)">

    </datalist>

  </section>
  <!--  Flights Page End -->
  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/main.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const $ = id => document.getElementById(id);

      // Swap Airports
      $("swapAirport")?.addEventListener("click", () => {
        [$("fromAirport").value, $("toAirport").value] =
          [$("toAirport").value, $("fromAirport").value];
      });

      // Date Validation
      const today = new Date().toISOString().split("T")[0];

      if ($("departureDate") && $("returnDate")) {
        $("departureDate").min = $("returnDate").min = today;

        $("departureDate").addEventListener("change", e => {
          $("returnDate").min = e.target.value;
        });
      }

      // Search Validation
      $("searchFlightBtn")?.addEventListener("click", () => {

        const data = {
          from: $("fromAirport")?.value,
          to: $("toAirport")?.value,
          departure: $("departureDate")?.value,
          returnDate: $("returnDate")?.value
        };

        for (const [key, value] of Object.entries(data)) {
          if (!value) {
            alert(`Please select ${key}.`);
            return;
          }
        }

        alert(`
Flight Search Submitted

From: ${data.from}
To: ${data.to}
Departure: ${data.departure}
Return: ${data.returnDate}`);
      });

      // Add Multi City Row
      $("addFlightBtn")?.addEventListener("click", () => {
        $("multiCityContainer").insertAdjacentHTML("beforeend", `
            <div class="row g-3 multi-city-row mt-2">
                <div class="col-lg-4"><input type="text" class="form-control" placeholder="Flying From"></div>
                <div class="col-lg-4"><input type="text" class="form-control" placeholder="Flying To"></div>
                <div class="col-lg-3"><input type="date" class="form-control"></div>
                <div class="col-lg-1"><button class="btn btn-danger removeFlight">×</button></div>
            </div>
        `);
      });

      // Global Click Events
      document.addEventListener("click", e => {

        // Remove Flight Row
        if (e.target.classList.contains("removeFlight")) {
          e.target.closest(".multi-city-row")?.remove();
        }

        // Popular Routes
        const routeLink = e.target.closest(".asap-popular-routes a");
        if (routeLink) {
          e.preventDefault();

          const [from, to] = routeLink.innerText.split("→") || [];

          if (from && to) {
            $("fromAirport").value = from.trim();
            $("toAirport").value = to.trim();
          }
        }
      });

      // Plane Animation Pause
      const plane = document.querySelector(".asap-plane-img");

      plane?.addEventListener("mouseenter", () =>
        plane.style.animationPlayState = "paused"
      );

      plane?.addEventListener("mouseleave", () =>
        plane.style.animationPlayState = "running"
      );

    });

    // Bootstrap Tab Event
    document.addEventListener("shown.bs.tab", e =>
      console.log("Active Tab:", e.target.dataset.bsTarget)
    );
  </script>

</body>

</html>
