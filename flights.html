<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ASAP Trips</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./images/favicon.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>
  <!-- Hero search Start -->
  <section class="asap-flights-page">

    <!-- Hero -->
    <section class="asap-flight-hero">

      <div class="container">

        <div class="row align-items-center">

          <!-- Left Content -->
          <div class="col-lg-6">

            <span class="asap-flight-badge">
              Flights Booking
            </span>

            <h1 class="asap-flight-title">
              Fly Smarter <br>
              Travel Better
            </h1>

            <p class="asap-flight-desc">
              Search hundreds of airlines and discover the best fares
              for your next adventure.
            </p>

          </div>

          <!-- Right Image -->
          <div class="col-lg-6">

            <div class="asap-plane-wrapper">

              <div class="asap-glow"></div>

              <img src="images/hero-plane.png" alt="Plane" class="img-fluid">

            </div>

          </div>

        </div>

      </div>

    </section>

    <!-- Search Box -->
    <div class="container">

      <div class="asap-search-box">

        <!-- Tabs -->

        <ul class="nav nav-pills asap-trip-tabs">

          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#roundtrip">
              Round Trip
            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#oneway">
              One Way
            </button>
          </li>

          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#multicity">
              Multi City
            </button>
          </li>

        </ul>

        <div class="tab-content">

          <!-- Round Trip -->

          <div class="tab-pane fade show active" id="roundtrip">

            <div class="row g-3 align-items-center">

              <div class="col-lg-3">

                <div class="asap-field">

                  <label>From</label>

                  <input type="text" class="form-control" list="airportList" placeholder="Delhi">

                </div>

              </div>

              <div class="col-lg-auto text-center">

                <button type="button" class="asap-swap-btn">

                  <i class="bi bi-arrow-left-right"></i>

                </button>

              </div>

              <div class="col-lg-3">

                <div class="asap-field">

                  <label>To</label>

                  <input type="text" class="form-control" list="airportList" placeholder="Dubai">

                </div>

              </div>

              <div class="col-lg-2">

                <div class="asap-field">

                  <label>Departure</label>

                  <input type="date" class="form-control">

                </div>

              </div>

              <div class="col-lg-2">

                <div class="asap-field">

                  <label>Return</label>

                  <input type="date" class="form-control">

                </div>

              </div>

              <div class="col-lg-auto">

                <button class="asap-search-btn">
                  <i class="bi bi-search"></i>
                </button>

              </div>

            </div>

          </div>

          <!-- One Way -->

          <div class="tab-pane fade" id="oneway">

            <div class="mt-4 text-center">

              <h5>One Way Flight Search</h5>

            </div>

          </div>

          <!-- Multi City -->

          <div class="tab-pane fade" id="multicity">

            <div class="mt-4 text-center">

              <h5>Multi City Search</h5>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- Airport Suggestions -->

    <datalist id="airportList">

      <option value="Delhi (DEL)">
      <option value="Mumbai (BOM)">
      <option value="Dubai (DXB)">
      <option value="London (LHR)">
      <option value="New York (JFK)">
      <option value="Singapore (SIN)">
      <option value="Bangkok (BKK)">
      <option value="Paris (CDG)">
      <option value="Toronto (YYZ)">

    </datalist>

  </section>
  <!-- Hero search Close -->
  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="js/main.js"></script>

</body>

</html>
